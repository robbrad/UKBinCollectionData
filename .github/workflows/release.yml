name: Release - Publish to PyPI

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1 # v4.0.0
        with:
          poetry-version: '1.8.4'

      - name: Cache Poetry dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Verify version matches tag
        run: |
          POETRY_VERSION=$(poetry version -s)
          if [ "$POETRY_VERSION" != "${{ env.RELEASE_VERSION }}" ]; then
            echo "Error: Poetry version ($POETRY_VERSION) doesn't match tag (${{ env.RELEASE_VERSION }})"
            exit 1
          fi

      - name: Validate locked dependency graph
        run: poetry check --lock

      - name: Verify atomic core and integration release contract
        run: >-
          python scripts/validate_release_contract.py
          --version "${{ env.RELEASE_VERSION }}"
          --require-exact

      - name: Build package
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH=315532800
          poetry build --format wheel

      - name: Validate built wheel metadata
        run: |
          set -euo pipefail
          WHEEL=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          test -n "$WHEEL"
          python scripts/validate_release_contract.py \
            --version "${{ env.RELEASE_VERSION }}" \
            --require-exact \
            --wheel "$WHEEL"

      - name: Verify pre-published exact core artifact from PyPI
        run: |
          set -euo pipefail
          WHEEL=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              "https://pypi.org/pypi/uk-bin-collection/${{ env.RELEASE_VERSION }}/json" \
              > dist/pypi-release.json; then
              python scripts/validate_release_contract.py \
                --version "${{ env.RELEASE_VERSION }}" \
                --require-exact \
                --wheel "$WHEEL" \
                --pypi-json dist/pypi-release.json
              exit $?
            fi
            sleep 15
          done
          echo "Exact core artifact did not become available from PyPI" >&2
          exit 1

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ env.RELEASE_VERSION }}
          generateReleaseNotes: true
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create workflow summary
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ env.RELEASE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- **PyPI**: https://pypi.org/project/uk-bin-collection/${{ env.RELEASE_VERSION }}/" >> $GITHUB_STEP_SUMMARY
            echo "- **GitHub Release**: https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_VERSION }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Release published successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Release failed - check logs above" >> $GITHUB_STEP_SUMMARY
          fi

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_API_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./uk_bin_collection_api_server
          push: true
          tags: |
            robbrad182/uk-bin-collection:${{ github.ref_name }}
            robbrad182/uk-bin-collection:latest
