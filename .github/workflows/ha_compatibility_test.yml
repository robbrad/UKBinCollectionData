name: PR - Home Assistant Compatibility Test

on:
  push:
    branches: [master, main]
    paths:
      - "custom_components/**"
      - "uk_bin_collection/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "poetry.lock"
      - "pytest.ini"
      - "conftest.py"
      - ".github/workflows/ha_compatibility_test.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "custom_components/**"
      - "uk_bin_collection/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "poetry.lock"
      - "pytest.ini"
      - "conftest.py"
      - ".github/workflows/ha_compatibility_test.yml"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  generate-matrix:
    name: Generate HA Version Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.get-versions.outputs.matrix }}
    steps:
      - name: Get supported HA versions from PyPI
        id: get-versions
        run: |
          set -euo pipefail
          MATRIX=$(curl --fail --silent --show-error \
            https://pypi.org/pypi/homeassistant/json | jq -c '
            .releases
            | to_entries
            | map(select(.key | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")))
            | group_by(.key | (split(".")[:2] | join(".")))
            | map(max_by(.key | (split(".")[2] | tonumber)) | .key)
            | sort_by(split(".") | map(tonumber))
            | .[-8:]
            # Keep the acceptance runtime in the matrix after it ages out of
            # the latest-eight window.
            | . + ["2026.7.2"]
            | unique
            | map({
                ha_version: .,
                expected_python: (
                  if (split(".")[0] | tonumber) >= 2026 then "3.14"
                  elif (split(".")[0] == "2025" and (split(".")[1] | tonumber) >= 2)
                  then "3.13"
                  else "3.12"
                  end
                )
              })
            | . + [{ha_version: "dev", expected_python: "3.14"}]
            | {include: .}
          ')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-candidate:
    name: Build Local Candidate Wheel
    runs-on: ubuntu-latest
    outputs:
      wheel_sha256: ${{ steps.wheel.outputs.sha256 }}
      wheel_name: ${{ steps.wheel.outputs.name }}
      candidate_version: ${{ steps.wheel.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install pinned Poetry
        run: pipx install poetry==1.8.4

      - name: Validate lock and release metadata
        run: |
          poetry check --lock
          python scripts/validate_release_contract.py \
            --version "$(poetry version -s)"

      - name: Build and hash candidate wheel
        id: wheel
        run: |
          set -euo pipefail
          poetry build --format wheel
          WHEEL=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          test -n "$WHEEL"
          SHA256=$(sha256sum "$WHEEL" | awk '{print $1}')
          echo "$SHA256  $(basename "$WHEEL")" > dist/SHA256SUMS
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$WHEEL")" >> "$GITHUB_OUTPUT"
          echo "version=$(poetry version -s)" >> "$GITHUB_OUTPUT"

      - name: Upload immutable candidate input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ha-candidate-wheel
          path: |
            dist/*.whl
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  test-ha-compatibility:
    name: Test HA ${{ matrix.ha_version }}
    runs-on: ubuntu-latest
    needs: [generate-matrix, build-candidate]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download local candidate wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ha-candidate-wheel
          path: candidate-dist

      - name: Verify downloaded wheel hash
        run: |
          set -euo pipefail
          cd candidate-dist
          sha256sum --check SHA256SUMS
          test "$(awk '{print $1}' SHA256SUMS)" = \
            "${{ needs.build-candidate.outputs.wheel_sha256 }}"

      - name: Stage tests without the core source tree
        run: |
          set -euo pipefail
          rm -rf .ha-test-workspace ha-results
          mkdir -p .ha-test-workspace/dist ha-results
          cp conftest.py pytest.ini .ha-test-workspace/
          cp -R custom_components .ha-test-workspace/
          cp candidate-dist/*.whl .ha-test-workspace/dist/

      - name: Resolve HA container tag
        id: image
        run: |
          if [ "${{ matrix.ha_version }}" = "dev" ]; then
            echo "ref=ghcr.io/home-assistant/home-assistant:dev" >> "$GITHUB_OUTPUT"
          else
            echo "ref=ghcr.io/home-assistant/home-assistant:${{ matrix.ha_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run component suite with installed local wheel
        run: |
          set -euo pipefail
          docker run --rm \
            --name "ukbcd-ha-${{ matrix.ha_version }}" \
            --mount "type=bind,source=$PWD/.ha-test-workspace,target=/workspace,readonly" \
            --mount "type=bind,source=$PWD/ha-results,target=/results" \
            --workdir /workspace \
            --entrypoint /bin/bash \
            "${{ steps.image.outputs.ref }}" -lc '
              set -euo pipefail
              python -m venv --system-site-packages /tmp/ha-test
              constraints=()
              if [ -f /usr/src/homeassistant/package_constraints.txt ]; then
                constraints=(-c /usr/src/homeassistant/package_constraints.txt)
              fi
              /tmp/ha-test/bin/python -m pip install \
                --disable-pip-version-check \
                "${constraints[@]}" \
                /workspace/dist/*.whl \
                pytest==9.0.2 \
                pytest-asyncio==1.3.0 \
                pytest-freezer==0.4.9 \
                freezegun==1.5.1
              /tmp/ha-test/bin/python -m pip install \
                --disable-pip-version-check \
                --force-reinstall \
                --no-deps \
                /workspace/dist/*.whl
              /tmp/ha-test/bin/python - <<"PY"
          from importlib.metadata import distribution
          from pathlib import Path
          import sys

          dist = distribution("uk-bin-collection")
          origin = Path(dist.locate_file("")).resolve()
          expected_python = tuple(
              int(part) for part in "${{ matrix.expected_python }}".split(".")
          )
          assert dist.version == "${{ needs.build-candidate.outputs.candidate_version }}", dist.version
          assert not origin.is_relative_to(Path("/workspace")), origin
          assert sys.version_info[:2] == expected_python, sys.version
          if "${{ matrix.ha_version }}" == "2026.7.2":
              assert expected_python == (3, 14), expected_python
          print(f"candidate={dist.version} origin={origin} python={sys.version.split()[0]}")
          PY
              /tmp/ha-test/bin/python -m pytest \
                -q custom_components/uk_bin_collection/tests \
                --junitxml="/results/ha-${{ matrix.ha_version }}.xml"
            '

      - name: Upload compatibility result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ha-result-${{ matrix.ha_version }}
          path: ha-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Record tested artifact
        if: always()
        run: |
          echo "## HA ${{ matrix.ha_version }} compatibility" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected Python generation: ${{ matrix.expected_python }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Candidate wheel: ${{ needs.build-candidate.outputs.wheel_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA-256: ${{ needs.build-candidate.outputs.wheel_sha256 }}" >> "$GITHUB_STEP_SUMMARY"

  compatibility-report:
    name: Generate Compatibility Report
    runs-on: ubuntu-latest
    needs: [generate-matrix, build-candidate, test-ha-compatibility]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "# Home Assistant Compatibility Report" >> "$GITHUB_STEP_SUMMARY"
          echo "- Matrix: \`${{ needs.generate-matrix.outputs.matrix }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wheel SHA-256: \`${{ needs.build-candidate.outputs.wheel_sha256 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Matrix result: \`${{ needs.test-ha-compatibility.result }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce compatibility gate
        if: always()
        env:
          GENERATE_MATRIX_RESULT: ${{ needs.generate-matrix.result }}
          BUILD_CANDIDATE_RESULT: ${{ needs.build-candidate.result }}
          HA_MATRIX_RESULT: ${{ needs.test-ha-compatibility.result }}
        run: |
          set -euo pipefail
          test "$GENERATE_MATRIX_RESULT" = "success"
          test "$BUILD_CANDIDATE_RESULT" = "success"
          test "$HA_MATRIX_RESULT" = "success"
